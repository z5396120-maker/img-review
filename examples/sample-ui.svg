      <stop offset="1" stop-color="#faf8f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1d1a16" flood-opacity=".14"/>
