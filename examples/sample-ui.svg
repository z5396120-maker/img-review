<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Img Review sample UI</title>
  <desc id="desc">A neutral dashboard mockup for trying Img Review annotations.</desc>
  <defs>
