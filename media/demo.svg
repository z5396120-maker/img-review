<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Img Review demo flow</title>
  <desc id="desc">Animated overview of selecting, transforming, and sending visual feedback to Codex.</desc>
  <style>
    :root {
      --bg: #11110f;
      --panel: #191916;
      --ink: #f7f2e8;
      --muted: #9d968b;
      --accent: #ff6b4a;
      --green: #a9e34b;
      --line: rgba(255,255,255,.14);
    }
    text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .step { opacity: 0; animation: step 12s infinite; }
    .step-1 { animation-delay: 0s; }
    .step-2 { animation-delay: 3s; }
    .step-3 { animation-delay: 6s; }
    .step-4 { animation-delay: 9s; }
    .cursor { animation: cursor 12s infinite ease-in-out; }
    .select-outline { stroke-dasharray: 9 8; animation: march 1s linear infinite; }
    .after-card { transform-box: fill-box; transform-origin: center; animation: transform-card 12s infinite ease-in-out; }
    .send-pulse { animation: pulse 12s infinite ease-in-out; transform-box: fill-box; transform-origin: center; }
    @keyframes step {
      0%, 23% { opacity: 1; }
      25%, 100% { opacity: 0; }
    }
    @keyframes cursor {
      0%, 10% { transform: translate(300px, 430px); }
      25%, 35% { transform: translate(548px, 308px); }
      50%, 60% { transform: translate(704px, 280px); }
      75%, 88% { transform: translate(1014px, 84px); }
      100% { transform: translate(300px, 430px); }
    }
    @keyframes march { to { stroke-dashoffset: -34; } }
    @keyframes transform-card {
      0%, 44% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0; }
      52%, 88% { transform: translate(92px, -34px) rotate(-5deg) scale(.82); opacity: 1; }
      100% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0; }
    }
    @keyframes pulse {
      0%, 70% { transform: scale(1); filter: none; }
      78%, 88% { transform: scale(1.06); filter: drop-shadow(0 0 18px rgba(255,107,74,.55)); }
      100% { transform: scale(1); filter: none; }
    }
  </style>

  <rect width="1280" height="720" rx="0" fill="var(--bg)"/>
  <rect x="28" y="28" width="1224" height="664" rx="32" fill="#0e0e0c" stroke="var(--line)"/>

  <g>
    <rect x="52" y="52" width="1176" height="70" rx="18" fill="#161512"/>
    <rect x="74" y="68" width="42" height="38" rx="12" fill="none" stroke="var(--accent)" stroke-width="2"/>
    <text x="88" y="94" fill="var(--accent)" font-size="25" font-weight="850">#</text>
    <text x="134" y="96" fill="var(--ink)" font-size="30" font-weight="850">Img Review</text>
    <text x="320" y="96" fill="var(--muted)" font-size="18" font-weight="750">visual feedback for Codex-powered vibe coding</text>
    <g class="send-pulse">
      <rect x="1046" y="66" width="152" height="40" rx="14" fill="var(--accent)"/>
      <text x="1071" y="92" fill="#fff7ef" font-size="18" font-weight="850">Send to Codex</text>
    </g>
  </g>

  <rect x="52" y="144" width="90" height="500" rx="20" fill="var(--panel)" stroke="var(--line)"/>
  <text x="78" y="184" fill="var(--muted)" font-size="13" font-weight="850">TOOLS</text>
  <g fill="none" stroke="var(--line)">
    <rect x="72" y="210" width="50" height="50" rx="13"/>
    <rect x="72" y="278" width="50" height="50" rx="13"/>
    <rect x="72" y="346" width="50" height="50" rx="13"/>
    <rect x="72" y="414" width="50" height="50" rx="13"/>
  </g>
  <text x="86" y="244" fill="var(--green)" font-size="28" font-weight="800">⌁</text>
  <text x="85" y="312" fill="var(--ink)" font-size="26" font-weight="800">□</text>
  <text x="84" y="380" fill="var(--ink)" font-size="28" font-weight="800">↗</text>
  <text x="86" y="448" fill="var(--ink)" font-size="28" font-weight="800">＋</text>

  <rect x="168" y="144" width="772" height="500" rx="24" fill="#050505" stroke="var(--line)"/>
  <g opacity=".5">
    <path d="M188 184h728M188 224h728M188 264h728M188 304h728M188 344h728M188 384h728M188 424h728M188 464h728M188 504h728M188 544h728M188 584h728" stroke="#20201c" stroke-dasharray="2 18"/>
    <path d="M208 164v456M248 164v456M288 164v456M328 164v456M368 164v456M408 164v456M448 164v456M488 164v456M528 164v456M568 164v456M608 164v456M648 164v456M688 164v456M728 164v456M768 164v456M808 164v456M848 164v456M888 164v456" stroke="#20201c" stroke-dasharray="2 18"/>
  </g>

  <g>
    <rect x="238" y="194" width="632" height="400" rx="24" fill="#f5efe5"/>
    <rect x="292" y="244" width="524" height="300" rx="26" fill="#fffefa"/>
    <text x="330" y="302" fill="#151411" font-size="40" font-weight="850">Project overview</text>
    <text x="332" y="342" fill="#746d63" font-size="22">A sample UI screen for visual feedback.</text>
    <rect x="332" y="398" width="142" height="92" rx="16" fill="#f1ead7"/>
    <rect x="506" y="398" width="142" height="92" rx="16" fill="#ded7ff"/>
    <rect x="680" y="398" width="142" height="92" rx="16" fill="#dcebd1"/>
    <rect x="332" y="515" width="356" height="42" rx="13" fill="var(--accent)"/>
  </g>

  <g class="after-card">
    <rect x="506" y="398" width="142" height="92" rx="16" fill="#ded7ff" stroke="var(--green)" stroke-width="4"/>
    <text x="540" y="448" fill="#171511" font-size="18" font-weight="850">After</text>
  </g>

  <g class="step step-1">
    <rect x="272" y="372" width="230" height="142" rx="20" fill="rgba(255,107,74,.08)" stroke="var(--accent)" stroke-width="3" stroke-dasharray="8 8"/>
    <text x="232" y="176" fill="var(--ink)" font-size="24" font-weight="850">1. Drop in a screenshot or generated image</text>
  </g>

  <g class="step step-2">
    <path d="M506 398h142v92H506z" fill="rgba(169,227,75,.12)" stroke="var(--green)" stroke-width="4" class="select-outline"/>
    <path d="M522 414c18 18 62 3 104 28" fill="none" stroke="var(--green)" stroke-width="14" stroke-linecap="round" opacity=".45"/>
    <text x="232" y="176" fill="var(--ink)" font-size="24" font-weight="850">2. Brush-select an element with Magic selection</text>
  </g>

  <g class="step step-3">
    <rect x="506" y="398" width="142" height="92" rx="16" fill="rgba(255,107,74,.05)" stroke="var(--accent)" stroke-width="3" stroke-dasharray="8 8"/>
    <text x="506" y="384" fill="var(--accent)" font-size="18" font-weight="850">Before</text>
    <text x="690" y="342" fill="var(--green)" font-size="18" font-weight="850">After</text>
    <text x="232" y="176" fill="var(--ink)" font-size="24" font-weight="850">3. Move, scale, and rotate to show the target state</text>
  </g>

  <g class="step step-4">
    <rect x="962" y="144" width="266" height="500" rx="24" fill="var(--panel)" stroke="var(--line)"/>
    <text x="990" y="196" fill="var(--ink)" font-size="30" font-weight="850">Annotations</text>
    <rect x="990" y="242" width="210" height="140" rx="18" fill="#1e1e1a" stroke="var(--accent)" stroke-width="2"/>
    <text x="1014" y="282" fill="var(--accent)" font-size="22" font-weight="900">1</text>
    <text x="1050" y="282" fill="var(--ink)" font-size="18" font-weight="850">MAGIC</text>
    <text x="1014" y="324" fill="var(--muted)" font-size="15">Move selected card</text>
    <text x="1014" y="348" fill="var(--muted)" font-size="15">Scale 82%, rotate -5°</text>
    <text x="232" y="176" fill="var(--ink)" font-size="24" font-weight="850">4. Send structured visual feedback back to Codex</text>
  </g>

  <g class="cursor">
    <path d="M0 0 0 32 9 24 15 38 24 34 17 20 29 20z" fill="#fff7ef" stroke="#11110f" stroke-width="2"/>
  </g>
</svg>
